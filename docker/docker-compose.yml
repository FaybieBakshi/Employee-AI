# docker-compose.yml — AI Employee Platinum Tier stack
#
# Services:
#   ai-employee  — Cloud Agent (draft-only, email triage)
#   odoo         — Odoo Community 17 (ERP / accounting)
#   postgres     — PostgreSQL 15 (Odoo backend)
#   nginx        — HTTPS reverse proxy (Let's Encrypt via certbot)
#
# Usage:
#   docker compose up -d          # start all services
#   docker compose logs -f ai-employee  # tail cloud agent logs
#   docker compose down           # stop all services
#
# Secrets: mount .env.cloud at runtime (never baked into image)
#   docker compose --env-file .env.cloud up -d

version: "3.9"

services:

  # ── Cloud AI Employee ──────────────────────────────────────────────
  ai-employee:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: ai-employee:platinum
    container_name: ai-employee
    restart: unless-stopped
    env_file:
      - ../.env.cloud        # secrets (never commit this file)
    environment:
      - VAULT_PATH=/vault/AI_Employee_Vault
      - AGENT_ROLE=cloud
      - DOMAIN=cloud
      - ODOO_URL=http://odoo:8069
    volumes:
      # Shared vault (git repo mounted read-write)
      - vault_data:/vault
      # SSH key for git push (read-only, never baked into image)
      - ${SSH_KEY_PATH:-~/.ssh/id_rsa}:/home/aiemployee/.ssh/id_rsa:ro
      # Gmail credentials (read-only)
      - ../credentials:/app/credentials:ro
    depends_on:
      - odoo
    networks:
      - ai-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ── Odoo Community 17 ──────────────────────────────────────────────
  odoo:
    image: odoo:17
    container_name: odoo
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      - HOST=postgres
      - USER=${ODOO_DB_USER:-odoo}
      - PASSWORD=${ODOO_DB_PASSWORD:-odoo_secret_here}
    ports:
      - "8069:8069"
    volumes:
      - odoo_data:/var/lib/odoo
      - ./odoo.conf:/etc/odoo/odoo.conf:ro
    networks:
      - ai-net
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ── PostgreSQL 15 ──────────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${ODOO_DB_USER:-odoo}
      - POSTGRES_PASSWORD=${ODOO_DB_PASSWORD:-odoo_secret_here}
      - POSTGRES_DB=odoo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ai-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Nginx HTTPS Reverse Proxy ──────────────────────────────────────
  nginx:
    image: nginx:1.25
    container_name: nginx
    restart: unless-stopped
    depends_on:
      - odoo
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    networks:
      - ai-net
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ── Certbot (one-shot certificate renewal) ────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Run manually: docker compose run --rm certbot certonly --webroot ...
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"
    networks:
      - ai-net

# ── Volumes ────────────────────────────────────────────────────────────
volumes:
  vault_data:
    driver: local
  odoo_data:
    driver: local
  postgres_data:
    driver: local
  certbot_certs:
    driver: local
  certbot_www:
    driver: local

# ── Networks ───────────────────────────────────────────────────────────
networks:
  ai-net:
    driver: bridge
